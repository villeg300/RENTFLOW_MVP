version: "3.9"

services:

  db:
    image: postgres:16
    container_name: rentflow_db

    restart: always

    environment:
      POSTGRES_DB: rentflow_db
      POSTGRES_USER: rentflow
      POSTGRES_PASSWORD: rentflowpassword

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: